<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VISIL Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: monospace;
      background: #0b0f14;
      color: #d7e1ea;
      padding: 20px;
    }

    .event {
      border-left: 2px solid #334155;
      margin: 10px 0;
      padding: 10px;
      background: #111827;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<h1>VISIL Timeline</h1>
<div id="timeline">loading...</div>

<script>
async function load() {
  try {
    const res = await fetch("./system/timeline/buffer.jsonl");
    const text = await res.text();

    const lines = text.trim().split("\n");
    const el = document.getElementById("timeline");
    el.innerHTML = "";

    for (let line of lines) {
      if (!line) continue;

      const e = JSON.parse(line);

      const div = document.createElement("div");
      div.className = "event";

      div.innerHTML = `
        <div class="meta">${e.timestamp}</div>
        <div>type: ${e.type}</div>
        <div>layer: ${e.layer}</div>
        <div>${e.message}</div>
      `;

      el.appendChild(div);
    }

  } catch (e) {
    document.getElementById("timeline").innerText = "timeline load failed";
  }
}

load();
</script>

</body>
</html>
