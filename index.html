<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VISIL Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/CSS/style.css">

  <style>
    body {
      font-family: monospace;
      background: #0b0f14;
      color: #d7e1ea;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #7dd3fc;
    }

    .event {
      border-left: 2px solid #334155;
      padding: 10px;
      margin: 10px 0;
      background: #111827;
    }

    .layer {
      color: #a78bfa;
    }

    .type {
      color: #34d399;
    }

    .time {
      color: #94a3b8;
      font-size: 12px;
    }

    .message {
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>VISIL Timeline</h1>
<div id="timeline">loading...</div>

<script>
async function loadTimeline() {
  try {
    // IMPORTANT: replace with YOUR repo path
    const url = "./system/timeline/buffer.jsonl";

    const res = await fetch(url);
    const text = await res.text();

    const lines = text.trim().split("\n");

    const container = document.getElementById("timeline");
    container.innerHTML = "";

    lines.forEach(line => {
      if (!line.trim()) return;

      const e = JSON.parse(line);

      const div = document.createElement("div");
      div.className = "event";

      div.innerHTML = `
        <div class="time">${e.timestamp}</div>
        <div class="type">type: ${e.type}</div>
        <div class="layer">layer: ${e.layer}</div>
        <div class="message">${e.message}</div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    document.getElementById("timeline").innerHTML =
      "VISIL failed to load timeline.";
  }
}

loadTimeline();
</script>

</body>
</html>
