name: Vera-Lynn CI (Stable Timeline)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Structure + Secrets Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Structure check
        run: |
          echo "Checking structure..."

          if [ ! -f "README.md" ]; then
            exit 1
          fi

          if [ ! -d "system" ]; then
            exit 1
          fi

          echo "✓ Structure OK"

      - name: Secret scan
        run: |
          PATTERNS="password|secret|api[_-]?key|token|authorization|private_key"

          if grep -rE "$PATTERNS" \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.env \
            --exclude="*.md" . 2>/dev/null; then
            exit 1
          fi

          echo "✓ No secrets found"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Build step
        run: |
          if [ -f "package.json" ]; then
            npm install
            npm run build || exit 1
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No build step"
          fi

          echo "✓ Build complete"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          if [ -f "package.json" ]; then
            npm test || exit 1
          elif [ -d "tests" ] || [ -f "pytest.ini" ]; then
            pip install -r requirements.txt 2>/dev/null || true
            pytest -v
          else
            echo "No tests found"
          fi

          echo "✓ Tests complete"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Unsafe pattern scan
        run: |
          UNSAFE="eval\(|exec\(|rm -rf /|curl .* \| bash"

          if grep -rE "$UNSAFE" \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            . 2>/dev/null; then
            exit 1
          fi

          echo "✓ Security OK"

  signal:
    name: Emit Timeline Event
    runs-on: ubuntu-latest
    needs: [validate, build, test, security]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Create timeline directory
        run: mkdir -p ci/timeline

      - name: Generate timeline event
        run: |
          EVENT_ID="run-${{ github.run_number }}-${{ github.sha }}"

          if [ "${{ needs.validate.result }}" = "success" ] && \
             [ "${{ needs.build.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ] && \
             [ "${{ needs.security.result }}" = "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILED"
          fi

          cat <<EOF > ci/timeline/${EVENT_ID}.json
{
  "event_id": "${EVENT_ID}",
  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",

  "repo": "${{ github.repository }}",
  "branch": "${{ github.ref_name }}",
  "commit": "${{ github.sha }}",
  "actor": "${{ github.actor }}",

  "workflow": "${{ github.workflow }}",
  "run_id": "${{ github.run_id }}",
  "run_number": "${{ github.run_number }}",

  "status": "${STATUS}",

  "jobs": {
    "validate": "${{ needs.validate.result }}",
    "build": "${{ needs.build.result }}",
    "test": "${{ needs.test.result }}",
    "security": "${{ needs.security.result }}"
  }
}
EOF

          echo "✓ Timeline event created: ${EVENT_ID}"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: signal
    if: always()

    steps:
      - run: |
          echo "CI COMPLETE"
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timeline event written"
