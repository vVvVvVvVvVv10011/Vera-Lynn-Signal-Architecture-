<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vera Lynn — Signal Architecture Portfolio</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background:#070a0f;
  color:#cfe6ff;
}

header {
  padding:40px;
  border-bottom:1px solid #1c2a3a;
}

h1 {
  margin:0;
  font-size:26px;
  color:#7cc4ff;
}

.sub {
  opacity:0.8;
  margin-top:10px;
}

.container {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
  padding:20px;
}

.card {
  border:1px solid #1b2a3a;
  padding:16px;
  background:#0c121a;
  cursor:pointer;
}

.card:hover {
  background:#101a26;
}

.panel {
  position:fixed;
  right:0;
  top:0;
  width:45%;
  height:100%;
  background:#0b1119;
  border-left:1px solid #223246;
  padding:20px;
  overflow:auto;
  display:none;
}

button {
  background:#1b2a3a;
  color:#cfe6ff;
  border:none;
  padding:10px;
  margin:6px 0;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>

<header>
  <h1>Vera Lynn</h1>
  <div class="sub">
    Signal Architecture • CLI Systems • Dataset Engineering • Annotation Tools
  </div>
</header>

<div class="container">

  <div class="card" onclick="openPanel('about')">
    👤 About
  </div>

  <div class="card" onclick="openPanel('projects')">
    🧠 Projects
  </div>

  <div class="card" onclick="openPanel('system')">
    ⚙ Live System
  </div>

  <div class="card" onclick="openPanel('dataset')">
    📊 Dataset Viewer
  </div>

</div>

<div id="panel" class="panel"></div>

<script>

async function loadLogs() {
  const res = await fetch("../data/logs.jsonl");
  const text = await res.text();

  return text.trim().split("\n").map(l => {
    try { return JSON.parse(l); } catch(e) { return null; }
  }).filter(Boolean);
}

async function openPanel(type) {
  const p = document.getElementById("panel");
  p.style.display = "block";

  if(type === "about") {
    p.innerHTML = `
      <h2>About</h2>
      <p>
        I build local-first systems for structured cognition, annotation,
        and signal processing pipelines.
      </p>
      <p>
        Focus: CLI tooling, dataset structure, and human-readable machine workflows.
      </p>
    `;
  }

  if(type === "projects") {
    p.innerHTML = `
      <h2>Projects</h2>

      <div>
        <b>VLSA Work CLI</b><br/>
        Annotation + logging + structured signal capture
      </div>

      <hr/>

      <div>
        <b>Signal Architecture</b><br/>
        Visual dataset + graph exploration system
      </div>
    `;
  }

  if(type === "system") {
    p.innerHTML = `
      <h2>Live System</h2>

      <button onclick="window.open('../data/logs.jsonl')">
        View Raw Dataset (JSONL)
      </button>

      <button onclick="alert('CLI bridge: vlsa.sh')">
        CLI Bridge (vlsa.sh)
      </button>
    `;
  }

  if(type === "dataset") {
    const logs = await loadLogs();

    p.innerHTML = `
      <h2>Dataset Viewer</h2>
      <p>Total entries: ${logs.length}</p>

      ${logs.slice(0,20).map(l => `
        <div style="border:1px solid #223; margin:6px 0; padding:6px;">
          <b>${l.module}</b> — ${l.text || l.msg || ""}
        </div>
      `).join("")}
    `;
  }
}

</script>

</body>
</html>
