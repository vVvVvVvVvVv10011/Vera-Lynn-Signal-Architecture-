<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VLSA Signal System</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background:#070a0f;
  color:#cfe6ff;
}

#app {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar {
  width:220px;
  background:#0b1119;
  border-right:1px solid #223246;
  padding:12px;
  position:relative;
}

#sidebar h3 {
  color:#7cc4ff;
  margin-bottom:20px;
}

#sidebar button {
  width:100%;
  margin-bottom:8px;
  background:#111a26;
  border:1px solid #223;
  padding:8px;
  color:#cfe6ff;
  cursor:pointer;
}

#sidebar button:hover {
  background:#152235;
}

#status {
  position:absolute;
  bottom:10px;
  font-size:12px;
  opacity:0.7;
}

/* MAIN */
#main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* COMMAND BAR */
#cmdbar {
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

#cmd {
  flex:1;
  padding:8px;
  background:#0b1119;
  border:1px solid #223;
  color:#cfe6ff;
}

/* DATA */
.entry {
  border:1px solid #223246;
  padding:8px;
  margin:6px 0;
  cursor:pointer;
  background:#0c121a;
}

.entry:hover {
  background:#111a26;
}

pre {
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h3>VLSA SYSTEM</h3>

    <button onclick="openPanel('dashboard')">Dashboard</button>
    <button onclick="openPanel('stream')">Signal Stream</button>
    <button onclick="openPanel('search')">Search</button>
    <button onclick="openPanel('graph')">Graph View</button>
    <button onclick="openPanel('export')">Export</button>

    <div id="status">● SYSTEM ONLINE</div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <div id="cmdbar">
      <input id="cmd" placeholder="search signals, tags, entities..." />
      <button onclick="runSearch()">RUN</button>
    </div>

    <div id="panel"></div>

  </div>

</div>

<script>

let GLOBAL_LOGS = [];

/* -----------------------------
   LOAD DATASET
----------------------------- */
async function loadLogs() {
  const res = await fetch("../data/logs.jsonl");
  const text = await res.text();

  GLOBAL_LOGS = text.trim().split("\n")
    .map(l => {
      try { return JSON.parse(l); } catch(e) { return null; }
    })
    .filter(Boolean);

  return GLOBAL_LOGS;
}

/* -----------------------------
   SEARCH ENGINE
----------------------------- */
function runSearch() {
  const q = document.getElementById("cmd").value.toLowerCase();

  const results = GLOBAL_LOGS.filter(l =>
    JSON.stringify(l).toLowerCase().includes(q)
  );

  renderStream(results);
}

/* -----------------------------
   MAIN ROUTER
----------------------------- */
async function openPanel(type) {

  const p = document.getElementById("panel");

  if(GLOBAL_LOGS.length === 0) {
    await loadLogs();
  }

  /* DASHBOARD */
  if(type === "dashboard") {
    p.innerHTML = `
      <h2>System Dashboard</h2>

      <div class="entry">Dataset size: ${GLOBAL_LOGS.length}</div>
      <div class="entry">Modules: vlsa / annotation / atrium</div>
      <div class="entry">Status: stable signal pipeline</div>
    `;
  }

  /* STREAM */
  if(type === "stream") {
    renderStream(GLOBAL_LOGS);
  }

  /* GRAPH */
  if(type === "graph") {
    const edges = GLOBAL_LOGS.filter(l =>
      l.entity && l.entity.startsWith("linked:")
    );

    p.innerHTML = `
      <h2>Graph View</h2>

      ${edges.length === 0 ? "<p>No links yet.</p>" : ""}

      ${edges.map(e => `
        <div class="entry">
          ${e.id || "node"} → ${e.entity}
        </div>
      `).join("")}
    `;
  }

  /* EXPORT */
  if(type === "export") {
    p.innerHTML = `
      <h2>Export Dataset</h2>

      <button onclick="downloadJSON()">Export JSON</button>
      <button onclick="downloadCSV()">Export CSV</button>
    `;
  }

  /* SEARCH MODE */
  if(type === "search") {
    p.innerHTML = `
      <h2>Search Mode</h2>
      <p>Use command bar above.</p>
    `;
  }
}

/* -----------------------------
   STREAM RENDER
----------------------------- */
function renderStream(data) {
  const p = document.getElementById("panel");

  p.innerHTML = `
    <h2>Signal Stream</h2>

    ${data.slice(-50).reverse().map(l => `
      <div class="entry">
        <b>${l.module}</b><br/>
        ${l.text || l.msg || ""}
        <br/>
        <small>${l.t || ""}</small>
      </div>
    `).join("")}
  `;
}

/* -----------------------------
   EXPORTERS
----------------------------- */
function downloadJSON() {
  const blob = new Blob([JSON.stringify(GLOBAL_LOGS, null, 2)], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "vlsa_dataset.json";
  a.click();
}

function downloadCSV() {
  if(GLOBAL_LOGS.length === 0) return;

  const keys = Object.keys(GLOBAL_LOGS[0]);

  const csv = [
    keys.join(","),
    ...GLOBAL_LOGS.map(row =>
      keys.map(k => JSON.stringify(row[k] || "")).join(",")
    )
  ].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "vlsa_dataset.csv";
  a.click();
}

</script>

</body>
</html>
