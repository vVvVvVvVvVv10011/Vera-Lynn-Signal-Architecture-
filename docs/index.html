<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signal Architecture v3</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background:#070a0f;
  color:#cfe6ff;
}

header {
  padding:20px;
  border-bottom:1px solid #1c2a3a;
}

h1 {
  margin:0;
  font-size:20px;
  color:#7cc4ff;
}

#grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
  padding:20px;
}

.card {
  border:1px solid #1b2a3a;
  padding:14px;
  background:#0c121a;
  cursor:pointer;
}

.card:hover {
  background:#101a26;
}

.panel {
  position:fixed;
  right:0;
  top:0;
  width:42%;
  height:100%;
  background:#0b1119;
  border-left:1px solid #223246;
  padding:20px;
  overflow:auto;
  display:none;
}

button {
  background:#1b2a3a;
  color:#cfe6ff;
  border:none;
  padding:8px;
  margin:6px 0;
  cursor:pointer;
  width:100%;
}

.entry {
  border:1px solid #223246;
  padding:8px;
  margin:6px 0;
  cursor:pointer;
}

.entry:hover {
  background:#111a26;
}

pre {
  white-space:pre-wrap;
}
</style>
</head>

<body>

<header>
  <h1>Signal Architecture v3</h1>
  <p>Live dataset explorer + annotation stream + export layer</p>
</header>

<div id="grid">

  <div class="card" onclick="openPanel('ledger')">
    📡 Ledger Signals
  </div>

  <div class="card" onclick="openPanel('checkpoints')">
    🧠 Checkpoints
  </div>

  <div class="card" onclick="openPanel('weaver')">
    🧬 Signal Weaver
  </div>

  <div class="card" onclick="openPanel('export')">
    📦 Dataset Export
  </div>

</div>

<div id="panel" class="panel"></div>

<script>
async function loadLogs() {
  const res = await fetch("../data/logs.jsonl");
  const text = await res.text();

  const lines = text.trim().split("\n");

  return lines
    .map(l => {
      try { return JSON.parse(l); } catch(e) { return null; }
    })
    .filter(Boolean);
}

async function openPanel(type) {
  const p = document.getElementById("panel");
  p.style.display = "block";

  if(type === "ledger") {
    const logs = await loadLogs();

    p.innerHTML = `
      <h2>Ledger Signals</h2>
      <p>Total entries: ${logs.length}</p>

      ${logs.map((l, i) => `
        <div class="entry" onclick='expandEntry(${JSON.stringify(l).replace(/'/g,"")})'>
          <b>${l.module || "unknown"}</b> — ${l.text || l.msg || ""}
        </div>
      `).join("")}
    `;
  }

  if(type === "checkpoints") {
    p.innerHTML = `
      <h2>Checkpoints</h2>
      <p>System state snapshots (future expansion).</p>
      <button>Compare states</button>
      <button>View timeline</button>
    `;
  }

  if(type === "weaver") {
    p.innerHTML = `
      <h2>Signal Weaver</h2>
      <p>Transforms raw logs into structured relations.</p>
      <button>Run weave (future)</button>
      <button>View graph (future)</button>
    `;
  }

  if(type === "export") {
    const logs = await loadLogs();

    p.innerHTML = `
      <h2>Dataset Export</h2>
      <p>Export annotated dataset formats.</p>

      <button onclick="downloadJSON(${JSON.stringify(logs).replace(/'/g,"")})">
        Export JSON
      </button>

      <button onclick="downloadCSV(${JSON.stringify(logs).replace(/'/g,"")})">
        Export CSV
      </button>
    `;
  }
}

function expandEntry(entry) {
  const p = document.getElementById("panel");

  p.innerHTML = `
    <h2>Signal Detail</h2>
    <pre>${JSON.stringify(entry, null, 2)}</pre>
    <button onclick="location.reload()">Back</button>
  `;
}

function downloadJSON(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "vlsa_dataset.json";
  a.click();
}

function downloadCSV(data) {
  const keys = Object.keys(data[0] || {});
  const csv = [
    keys.join(","),
    ...data.map(row =>
      keys.map(k => JSON.stringify(row[k] || "")).join(",")
    )
  ].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "vlsa_dataset.csv";
  a.click();
}
</script>

</body>
</html>
