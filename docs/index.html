<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signal Architecture v2</title>

<style>
body {
  margin:0;
  font-family: monospace;
  background:#070a0f;
  color:#cfe6ff;
}

header {
  padding:20px;
  border-bottom:1px solid #1c2a3a;
}

h1 {
  margin:0;
  font-size:20px;
  color:#7cc4ff;
}

#grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
  padding:20px;
}

.card {
  border:1px solid #1b2a3a;
  padding:14px;
  background:#0c121a;
  cursor:pointer;
}

.card:hover {
  background:#101a26;
}

.panel {
  position:fixed;
  right:0;
  top:0;
  width:40%;
  height:100%;
  background:#0b1119;
  border-left:1px solid #223246;
  padding:20px;
  overflow:auto;
  display:none;
}

button {
  background:#1b2a3a;
  color:#cfe6ff;
  border:none;
  padding:8px;
  margin:5px 0;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>

<header>
  <h1>Signal Architecture v2</h1>
  <p>Structured annotation + dataset + signal graph system</p>
</header>

<div id="grid">

  <div class="card" onclick="openPanel('ledger')">
    📡 Ledger Signals
  </div>

  <div class="card" onclick="openPanel('checkpoints')">
    🧠 Checkpoints
  </div>

  <div class="card" onclick="openPanel('weaver')">
    🧬 Signal Weaver
  </div>

  <div class="card" onclick="openPanel('export')">
    📦 Dataset Export Modes
  </div>

</div>

<div id="panel" class="panel"></div>

<script>
function openPanel(type){
  let p = document.getElementById("panel");
  p.style.display = "block";

  if(type === "ledger"){
    p.innerHTML = `
      <h2>Ledger Signals</h2>
      <p>Raw event stream stored as JSONL.</p>
      <button>View JSONL</button>
      <button>Filter by tag</button>
      <button>Trace entity links</button>
    `;
  }

  if(type === "checkpoints"){
    p.innerHTML = `
      <h2>Checkpoints</h2>
      <p>State snapshots of system evolution.</p>
      <button>Open latest state</button>
      <button>Compare states</button>
    `;
  }

  if(type === "weaver"){
    p.innerHTML = `
      <h2>Signal Weaver</h2>
      <p>Transforms raw signals into structured relations.</p>
      <button>Run transformation</button>
      <button>View graph</button>
    `;
  }

  if(type === "export"){
    p.innerHTML = `
      <h2>Dataset Export</h2>
      <p>AI training-ready outputs.</p>
      <button>Export CSV</button>
      <button>Export JSONL</button>
      <button>Export Graph Format</button>
    `;
  }
}
</script>

</body>
</html>
